[alembic]
# script_location 指向迁移目录，相对于 alembic.ini 所在目录（apps/api/）
script_location = alembic

# 迁移脚本文件命名格式
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# 编码
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
