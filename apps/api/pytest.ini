[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: 需要真实 MySQL（行锁/并发等），CI 默认跳过。运行：pytest -m integration
addopts = -ra
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
