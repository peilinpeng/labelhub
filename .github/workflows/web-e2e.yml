name: Web E2E (real backend)

# 真后端端到端：用 docker compose 起全栈（mysql/redis/api/worker/web + seed 播种），
# 再用 Playwright 打 :5173（web 经 proxy 到 api，即真后端）。
# 这是唯一能拦「mock 与真后端契约漂移」的门禁——审核详情页白屏正是这一类。
# 较重，默认仅在涉及前后端契约面的改动 + 手动触发时跑。

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "packages/contracts/**"
      - "docker-compose.yml"
      - ".github/workflows/web-e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bring up full stack (waits for healthchecks + seed)
        run: docker compose up -d --build --wait

      - name: Wait for web (:5173)
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:5173/; then echo "web up"; exit 0; fi
            sleep 2
          done
          echo "web did not become ready"; docker compose logs --tail=100; exit 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web deps
        working-directory: apps/web
        run: npm install

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v
